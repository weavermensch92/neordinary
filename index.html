  <style>
    /* --- Pure Original Baseline --- */
    /* 1. 1200px 이상: 1920px 기준 비례 스케일링 (1920px에서 font-size 16px) */
    @media (min-width: 1200px) {
      html {
        font-size: calc(100vw / 120) !important;
      }
    }

    /* 2. 800px 이상 ~ 1200px 미만: 크기 고정 (1200px 기준인 10px로 고정), 가로 스크롤 허용 위해 1200 고정 박스 필요시 사용 */
    @media (max-width: 1199.98px) and (min-width: 800px) {
      html {
        font-size: 10px !important;
      }

      .scroll-container {
        /* 내부 요소들이 1200px 기준 비율을 유지하려면 이 정도 크기가 필요 */
        min-width: 1200px;
      }
    }

    /* 3. 800px 미만: 모바일 형식 대응 (기본 16px에 가깝게 혹은 모바일 디자인에 맞게 스케일) */
    @media (max-width: 799.98px) {
      html {
        font-size: 14px !important;
      }
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #050505;
      color: white;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    #root {
      width: 100vw;
      height: 100vh;
    }

    .scroll-container::-webkit-scrollbar {
      display: none;
    }

    .scroll-container {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .border-grid {
      border-color: rgba(255, 255, 255, 0.15);
    }

    .text-accent {
      color: #FF3300;
    }

    .bg-accent {
      background-color: #FF3300;
    }

    /* --- Studio Page Special Rules --- */
    #studio-wrapper.studio-active {
      cursor: none !important;
    }

    #studio-wrapper.studio-active * {
      cursor: none !important;
    }

    @keyframes noise-1 {

      0%,
      100% {
        clip-path: inset(50% 0 30% 0);
      }

      20% {
        clip-path: inset(20% 0 80% 0);
      }

      40% {
        clip-path: inset(80% 0 10% 0);
      }

      60% {
        clip-path: inset(10% 0 50% 0);
      }

      80% {
        clip-path: inset(60% 0 20% 0);
      }
    }

    @keyframes noise-2 {

      0%,
      100% {
        clip-path: inset(10% 0 60% 0);
      }

      20% {
        clip-path: inset(80% 0 5% 0);
      }

      40% {
        clip-path: inset(40% 0 30% 0);
      }

      60% {
        clip-path: inset(70% 0 10% 0);
      }

      80% {
        clip-path: inset(20% 0 50% 0);
      }
    }

    .glitch-layer-1 {
      animation: noise-1 2s infinite linear alternate-reverse;
    }

    .glitch-layer-2 {
      animation: noise-2 2.5s infinite linear alternate-reverse;
    }
  </style>
